<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register · Daily Work Log</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body class="auth-body">
  <div id="page-loader" class="page-loader" aria-hidden="true">
    <div class="loader-spinner"></div>
  </div>

  <main class="auth-shell page-enter">
    <section class="auth-card card card-elevated">
      <div class="auth-brand">
        <div class="sidebar-brand-icon"><i data-lucide="clipboard-list"></i></div>
        <div>
          <h1>Create account</h1>
          <p>Start logging work with your own private space.</p>
        </div>
      </div>

      <form id="register-form" novalidate>
        <div class="form-floating">
          <input type="text" id="reg-name" class="form-control" placeholder=" " required autocomplete="name" maxlength="60" />
          <label for="reg-name">Full name</label>
        </div>
        <div class="form-floating">
          <input type="email" id="reg-email" class="form-control" placeholder=" " required autocomplete="email" />
          <label for="reg-email">Email</label>
        </div>
        <div class="form-floating">
          <input type="password" id="reg-password" class="form-control" placeholder=" " required autocomplete="new-password" minlength="6" />
          <label for="reg-password">Password (min 6)</label>
        </div>
        <div class="form-floating">
          <input type="password" id="reg-confirm" class="form-control" placeholder=" " required autocomplete="new-password" minlength="6" />
          <label for="reg-confirm">Confirm password</label>
        </div>
        <p id="register-error" class="auth-error hidden" role="alert"></p>
        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <i data-lucide="user-plus"></i> Create account
        </button>
      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>
    </section>
  </main>

  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
