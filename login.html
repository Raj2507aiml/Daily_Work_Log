<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · Daily Work Log</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="components.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="animations.css" />
  <link rel="stylesheet" href="responsive.css" />
</head>
<body class="auth-body">
  <div id="page-loader" class="page-loader" aria-hidden="true">
    <div class="loader-spinner"></div>
  </div>

  <main class="auth-shell page-enter">
    <section class="auth-card card card-elevated">
      <div class="auth-brand">
        <div class="sidebar-brand-icon"><i data-lucide="clipboard-list"></i></div>
        <div>
          <h1>Daily Work Log</h1>
          <p>Sign in to continue tracking your work.</p>
        </div>
      </div>

      <form id="login-form" novalidate>
        <div class="form-floating">
          <input type="email" id="login-email" class="form-control" placeholder=" " required autocomplete="email" />
          <label for="login-email">Email</label>
        </div>
        <div class="form-floating">
          <input type="password" id="login-password" class="form-control" placeholder=" " required autocomplete="current-password" minlength="6" />
          <label for="login-password">Password</label>
        </div>
        <label class="auth-remember">
          <input type="checkbox" id="login-remember" checked />
          <span>Remember me on this device</span>
        </label>
        <p id="login-error" class="auth-error hidden" role="alert"></p>
        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <i data-lucide="log-in"></i> Sign in
        </button>
      </form>

      <p class="auth-switch">
        New here?
        <a href="register.html">Create an account</a>
      </p>
    </section>
  </main>

  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script src="auth.js"></script>
  <script src="storage.js"></script>
  <script src="theme.js"></script>
  <script src="app.js"></script>
</body>
</html>
